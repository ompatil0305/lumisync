<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Lumisync — Campus life, in motion.</title>
    <meta name="description" content="Campus life, in motion. Lumisync unifies your campus map, dining, parking, faculty directory, and AI assistant into one app." />
    <meta name="keywords" content="campus app, university app, AI campus, student app, campus map, dining, events, Lumisync" />
    <meta name="author" content="Lumisync" />
    <meta name="theme-color" content="#CC0000" />
    <meta name="color-scheme" content="light dark" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lumisync" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lumisync.vercel.app/" />
    <meta property="og:title" content="Lumisync — Campus life, in motion." />
    <meta property="og:description" content="Campus life, in motion. Lumisync unifies your campus map, dining, parking, faculty directory, and AI assistant into one app." />
    <meta property="og:image" content="https://lumisync.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lumisync — Campus life, in motion." />
    <meta name="twitter:description" content="Campus life, in motion. Lumisync unifies your campus map, dining, parking, faculty directory, and AI assistant into one app." />
    <meta name="twitter:image" content="https://lumisync.vercel.app/og-image.png" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Google Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root">
      <!-- Branded Hydration Loading Skeleton -->
      <style>
        .hydration-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #000000;
          color: #FAFAF9;
          font-family: system-ui, -apple-system, sans-serif;
          z-index: 9999;
        }
        .hydration-logo {
          width: 56px;
          height: 56px;
          animation: logo-pulse 1.8s ease-in-out infinite;
        }
        .hydration-bar {
          width: 140px;
          height: 2px;
          background-color: rgba(255, 255, 255, 0.1);
          border-radius: 99px;
          margin-top: 24px;
          overflow: hidden;
          position: relative;
        }
        .hydration-progress {
          position: absolute;
          left: 0;
          top: 0;
          height: 100%;
          width: 50%;
          background-color: #CC0000;
          border-radius: 99px;
          animation: bar-slide 1.5s ease-in-out infinite;
        }
        @keyframes logo-pulse {
          0%, 100% { opacity: 0.6; transform: scale(0.96); }
          50% { opacity: 1; transform: scale(1); }
        }
        @keyframes bar-slide {
          0% { left: -50%; }
          100% { left: 100%; }
        }
      </style>
      <div class="hydration-loader">
        <svg class="hydration-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="#ffffff" stroke-width="3" opacity="0.15" />
          <path d="M20 5A15 15 0 0 1 35 20" stroke="#CC0000" stroke-width="3.5" stroke-linecap="round" />
          <path d="M20 35A15 15 0 0 1 5 20" stroke="#CC0000" stroke-width="3.5" stroke-linecap="round" />
          <circle cx="20" cy="20" r="5" fill="#ffffff" />
        </svg>
        <div class="hydration-bar">
          <div class="hydration-progress"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

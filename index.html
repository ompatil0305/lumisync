<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Lumisync — Your AI-Powered Campus Companion</title>
    <meta name="description" content="Lumisync supercharges your campus experience. Explore dining, events, campus maps, parking, jobs, and more — all powered by AI. Built for universities worldwide." />
    <meta name="keywords" content="campus app, university app, AI campus, student app, campus map, dining, events, Lumisync" />
    <meta name="author" content="Lumisync" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="color-scheme" content="light dark" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lumisync" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lumisync.app/" />
    <meta property="og:title" content="Lumisync — Your AI-Powered Campus Companion" />
    <meta property="og:description" content="Supercharge your campus experience with Lumisync. Dining, events, maps, jobs, and an AI assistant — all in one app." />
    <meta property="og:image" content="https://lumisync.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lumisync — Your AI-Powered Campus Companion" />
    <meta name="twitter:description" content="Supercharge your campus experience with Lumisync." />
    <meta name="twitter:image" content="https://lumisync.app/og-image.png" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Google Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
